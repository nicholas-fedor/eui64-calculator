name: Create Docker Manifests

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag for production builds (ignored for dev)"
        required: false
        type: string
      project_name:
        description: "Name of the project for Docker image names"
        required: true
        type: string
      docker_namespace:
        description: "Docker Hub namespace for image names (e.g., 'nickfedor')"
        required: true
        type: string
      ghcr_namespace:
        description: "GitHub Container Registry namespace for image names (e.g., 'nicholas-fedor')"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@da5b89b92c1be57a07eeed1334a0728b94145654
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@da5b89b92c1be57a07eeed1334a0728b94145654
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker manifests
        run: |
          docker buildx imagetools create -t "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:${INPUTS_VERSION}" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:amd64-${INPUTS_VERSION}" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:i386-${INPUTS_VERSION}" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:armhf-${INPUTS_VERSION}" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:arm64v8-${INPUTS_VERSION}" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:riscv64-${INPUTS_VERSION}"
          docker buildx imagetools create -t "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:latest" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:amd64-latest" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:i386-latest" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:armhf-latest" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:arm64v8-latest" \
            "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:riscv64-latest"
          docker buildx imagetools create -t "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:${INPUTS_VERSION}" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:amd64-${INPUTS_VERSION}" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:i386-${INPUTS_VERSION}" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:armhf-${INPUTS_VERSION}" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:arm64v8-${INPUTS_VERSION}" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:riscv64-${INPUTS_VERSION}"
          docker buildx imagetools create -t "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:latest" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:amd64-latest" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:i386-latest" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:armhf-latest" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:arm64v8-latest" \
            "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:riscv64-latest"
        env:
          INPUTS_DOCKER_NAMESPACE: ${{ inputs.docker_namespace }}
          INPUTS_PROJECT_NAME: ${{ inputs.project_name }}
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_GHCR_NAMESPACE: ${{ inputs.ghcr_namespace }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign Docker Manifests with Cosign (Keyless)
        run: |
          cosign sign --yes "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:${INPUTS_VERSION}"
          cosign sign --yes "${INPUTS_DOCKER_NAMESPACE}/${INPUTS_PROJECT_NAME}:latest"
          cosign sign --yes "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:${INPUTS_VERSION}"
          cosign sign --yes "ghcr.io/${INPUTS_GHCR_NAMESPACE}/${INPUTS_PROJECT_NAME}:latest"
        shell: bash
        env:
          INPUTS_DOCKER_NAMESPACE: ${{ inputs.docker_namespace }}
          INPUTS_PROJECT_NAME: ${{ inputs.project_name }}
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_GHCR_NAMESPACE: ${{ inputs.ghcr_namespace }}
